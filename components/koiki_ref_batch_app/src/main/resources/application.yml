spring:
  application:
    name: koiki-ref-batch-app
  batch:
    job:
      name: customer-daily-sync

koiki:
  batch:
    security:
      masking:
        # Audit attribute keys whose values must be masked before they reach the
        # audit log. The customer-daily-sync tasklet emits "accountId" as a demo.
        sensitive-keys:
          - accountId

logging:
  level:
    "[org.koikifw]": INFO
  # MDC correlation populated by the libkoiki-batch JobLogListener / StepLogListener.
  # Spring Boot inserts this pattern into the default console/file format.
  pattern:
    correlation: "[%X{koiki.job.name:-} %X{koiki.job.execId:-} %X{koiki.step.name:-}] "
